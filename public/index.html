<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Claude Code Remote</title>
<link rel="stylesheet" href="./refers/xterm.min.css">
<script src="./refers/xterm.min.js"></script>
<script src="./refers/addon-fit.min.js"></script>
<script src="./refers/addon-web-links.min.js"></script>
<script src="./refers/addon-webgl.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f172a; color: #e2e8f0; font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* Header */
  header { display: flex; align-items: center; justify-content: space-between; padding: 4px 10px; background: #1e293b; border-bottom: 1px solid #334155; flex-shrink: 0; }
  header h1 { font-size: 13px; font-weight: bold; color: white; }
  .header-left { display: flex; align-items: center; gap: 8px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .status-idle { background: #6b7280; }
  .status-running { background: #22c55e; animation: pulse 1.5s infinite; }
  .status-waiting { background: #eab308; animation: pulse 1s infinite; }
  .status-error { background: #ef4444; }
  .status-badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; }
  .badge-connected { background: #166534; color: #86efac; }
  .badge-disconnected { background: #374151; color: #9ca3af; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  .header-btns { display: flex; gap: 6px; }
  .header-btns button { padding: 3px 10px; font-size: 11px; border: none; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
  .btn-interrupt { background: #991b1b; color: #fca5a5; }
  .btn-interrupt:hover:not(:disabled) { background: #b91c1c; }
  .btn-new { background: #334155; color: #cbd5e1; }
  .btn-new:hover:not(:disabled) { background: #475569; }
  button:disabled { background: #1e293b !important; color: #4b5563 !important; cursor: not-allowed; }

  /* Connect Panel */
  #connectPanel { display: flex; align-items: center; justify-content: center; flex: 1; }
  .connect-card { background: #1e293b; border-radius: 12px; padding: 32px; width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .connect-card h2 { text-align: center; font-size: 18px; font-weight: bold; color: white; margin-bottom: 24px; }
  .connect-card label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
  .connect-card input { width: 100%; padding: 8px 12px; background: #0f172a; border: 1px solid #475569; border-radius: 6px; color: white; font-size: 14px; font-family: inherit; outline: none; margin-bottom: 16px; }
  .connect-card input:focus { border-color: #3b82f6; }
  .connect-card button { width: 100%; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .connect-card button:hover { background: #1d4ed8; }

  /* Auto-connect loading overlay */
  .auto-connect-loading { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px 32px; text-align: center; }
  .auto-connect-loading.visible { display: flex; }
  .auto-connect-spinner { width: 40px; height: 40px; border: 3px solid #334155; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .auto-connect-loading p { font-size: 14px; color: #94a3b8; }
  .auto-connect-loading p span { color: #e2e8f0; font-weight: 600; }

  /* Terminal Panel */
  #terminalPanel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  #terminalPanel.visible { display: flex; }
  #termContainer { flex: 1; overflow: hidden; padding: 2px; background: #000; }

  /* Action bar */
  .action-bar { display: flex; gap: 6px; padding: 6px 8px; background: #1e293b; border-top: 1px solid #334155; flex-shrink: 0; justify-content: center; }
  .action-bar button { padding: 10px 32px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .action-bar button:hover { background: #1d4ed8; }

  /* Virtual keyboard (mobile) */
  .vk-bar { display: none; padding: 3px 8px 12px; background: #1e293b; border-top: 1px solid #334155; flex-shrink: 0; gap: 3px; flex-wrap: wrap; justify-content: center; }
  @media (max-width: 768px) { .vk-bar { display: flex; } }
  .vk-bar button { padding: 6px 12px; background: #334155; color: #e2e8f0; border: 1px solid #475569; border-radius: 6px; font-size: 12px; font-family: inherit; cursor: pointer; min-width: 40px; text-align: center; }
  .vk-bar button:active { background: #475569; }

  /* Slash command panel */
  .slash-panel { display: none; padding: 4px 8px; background: #0f172a; border-top: 1px solid #334155; flex-shrink: 0; gap: 4px; flex-wrap: wrap; max-height: 180px; overflow-y: auto; }
  .slash-panel.visible { display: flex; }
  .slash-panel button { padding: 6px 10px; background: #1e3a5f; color: #93c5fd; border: 1px solid #2563eb; border-radius: 6px; font-size: 12px; font-family: inherit; cursor: pointer; white-space: nowrap; }
  .slash-panel button:active { background: #2563eb; color: white; }
  .slash-panel button .cmd-desc { color: #64748b; font-size: 10px; margin-left: 4px; }

  /* xterm overrides */
  .xterm { height: 100%; }
  .xterm-viewport { overflow-y: auto !important; }

  /* Expired overlay */
  #expiredOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.92); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }
  #expiredOverlay.visible { display: flex; }
  #expiredOverlay h2 { color: #fca5a5; font-size: 20px; margin-bottom: 12px; }
  #expiredOverlay p { color: #94a3b8; font-size: 14px; }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="header-left">
    <h1>Claude Code Remote 1</h1>
    <span id="statusBadge" class="status-badge badge-disconnected">Disconnected</span>
    <span class="status-dot status-idle" id="statusDot"></span>
  </div>
  <div class="header-btns">
    <button id="btnInterrupt" class="btn-interrupt" onclick="doInterrupt()" disabled>Interrupt</button>
    <button id="btnNewSession" class="btn-new" onclick="doNewSession()" disabled>New Session</button>
  </div>
</header>

<!-- Expired overlay -->
<div id="expiredOverlay">
  <h2>Token 已失效</h2>
  <p>请重新启动服务获取新的连接</p>
</div>

<!-- Connect Panel -->
<div id="connectPanel">
  <div class="connect-card">
    <div id="connectForm">
      <h2>Connect to Bridge</h2>
      <label>Bridge URL</label>
      <input id="inputUrl" type="text" placeholder="<YourWebPageHost>:3456/ws">
      <label>Token</label>
      <input id="inputToken" type="text" placeholder="Paste your token">
      <button onclick="doConnect()">Connect</button>
    </div>
    <div id="autoConnectLoading" class="auto-connect-loading">
      <div class="auto-connect-spinner"></div>
      <p><span>正在自动连接...</span></p>
      <p style="margin-top: 8px;">扫码认证成功，正在建立连接</p>
    </div>
  </div>
</div>

<!-- Terminal Panel -->
<div id="terminalPanel">
  <div id="termContainer"></div>
  <div class="action-bar">
    <button onclick="doSend()" ontouchend="event.preventDefault();doSend();return false;">Send</button>
    <button id="btnSlashCmds" onclick="toggleSlashPanel()" ontouchend="event.preventDefault();toggleSlashPanel();return false;" style="background:#1e3a5f;color:#93c5fd;border-color:#2563eb;">Commands</button>
  </div>
  <div class="vk-bar">
    <button onclick="sendInput('\t')" ontouchend="event.preventDefault();sendInput('\t');return false;">Tab</button>
    <button onclick="sendInput('\x03')" ontouchend="event.preventDefault();sendInput('\x03');return false;">Ctrl+C</button>
    <button onclick="sendInput('\x1b[A')" ontouchend="event.preventDefault();sendInput('\x1b[A');return false;">Up</button>
    <button onclick="sendInput('\x1b[B')" ontouchend="event.preventDefault();sendInput('\x1b[B');return false;">Down</button>
    <button onclick="sendInput('\x1b[D')" ontouchend="event.preventDefault();sendInput('\x1b[D');return false;">Left</button>
    <button onclick="sendInput('\x1b[C')" ontouchend="event.preventDefault();sendInput('\x1b[C');return false;">Right</button>
    <button onclick="sendInput('\x1b[1;5A')" ontouchend="event.preventDefault();sendInput('\x1b[1;5A');return false;">Ctrl+Up</button>
    <button onclick="sendInput('\x1b[1;5B')" ontouchend="event.preventDefault();sendInput('\x1b[1;5B');return false;">Ctrl+Down</button>
    <button onclick="sendInput('\x7f')" ontouchend="event.preventDefault();sendInput('\x7f');return false;">Backspace</button>
    <button onclick="sendInput('\x1b')" ontouchend="event.preventDefault();sendInput('\x1b');return false;">Esc</button>
  </div>
  <!-- Slash command panel -->
  <div id="slashPanel" class="slash-panel">
    <button onclick="sendSlashCommand('/clear')">/clear <span class="cmd-desc">清空对话</span></button>
    <button onclick="sendSlashCommand('/compact')">/compact <span class="cmd-desc">压缩上下文</span></button>
    <button onclick="sendSlashCommand('/help')">/help <span class="cmd-desc">帮助</span></button>
    <button onclick="sendSlashCommand('/fast')">/fast <span class="cmd-desc">快速模式</span></button>
    <button onclick="sendSlashCommand('/model')">/model <span class="cmd-desc">切换模型</span></button>
    <button onclick="sendSlashCommand('/status')">/status <span class="cmd-desc">状态</span></button>
    <button onclick="sendSlashCommand('/cost')">/cost <span class="cmd-desc">费用</span></button>
    <button onclick="sendSlashCommand('/permissions')">/permissions <span class="cmd-desc">权限</span></button>
    <button onclick="sendSlashCommand('/review')">/review <span class="cmd-desc">代码审查</span></button>
    <button onclick="sendSlashCommand('/commit')">/commit <span class="cmd-desc">提交</span></button>
    <button onclick="sendSlashCommand('/pr-comments')">/pr-comments <span class="cmd-desc">PR 评论</span></button>
    <button onclick="sendSlashCommand('/memory')">/memory <span class="cmd-desc">记忆管理</span></button>
    <button onclick="sendSlashCommand('/doctor')">/doctor <span class="cmd-desc">诊断</span></button>
    <button onclick="sendSlashCommand('/bug')">/bug <span class="cmd-desc">报告 bug</span></button>
  </div>
</div>

<script>
let ws = null;
let term = null;
let fitAddon = null;

// Auto-fill Bridge URL based on current page address
(function() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const host = location.host.startsWith('localhost') ? "<Your Server Host>:Port": location.host;
  document.getElementById('inputUrl').value = proto + '//' + host + '/ws';

  // Auto-connect from URL params (QR code flow)
  const params = new URLSearchParams(location.search);
  const autoToken = params.get('token');
  const autoExpires = params.get('expires');

  if (autoToken && autoExpires) {
    const expiresNum = parseInt(autoExpires, 10);

    // Client-side expiry check
    if (Date.now() > expiresNum) {
      document.getElementById('expiredOverlay').classList.add('visible');
      return;
    }

    // Server-side verify (handles clock skew)
    // Show loading state
    document.getElementById('connectForm').style.display = 'none';
    document.getElementById('autoConnectLoading').classList.add('visible');

    fetch(`/verify-token?token=${encodeURIComponent(autoToken)}&expires=${autoExpires}`)
      .then(r => r.json())
      .then(result => {
        if (!result.valid) {
          document.getElementById('expiredOverlay').classList.add('visible');
          return;
        }
        const url = proto + '//' + location.host + '/ws';
        doConnectWithExpires(url, autoToken, expiresNum);
      })
      .catch(() => {
        // If verify fails, still try to connect
        const url = proto + '//' + location.host + '/ws';
        doConnectWithExpires(url, autoToken, expiresNum);
      });
  }
})();

function setStatus(text) {
  const badge = document.getElementById('statusBadge');
  badge.textContent = text;
  badge.className = 'status-badge ' + (text === 'Connected' ? 'badge-connected' : 'badge-disconnected');
}

function setClaudeStatus(status) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot status-' + ({ idle: 'idle', running: 'running', waiting_permission: 'waiting', error: 'error' }[status] || 'idle');
}

function initTerminal() {
  if (term) return;
  term = new Terminal({
    theme: {
      background: '#0f172a',
      foreground: '#e2e8f0',
      cursor: '#5eead4',
      selectionBackground: '#334155',
      black: '#1e293b',
      red: '#f87171',
      green: '#4ade80',
      yellow: '#facc15',
      blue: '#60a5fa',
      magenta: '#c084fc',
      cyan: '#22d3ee',
      white: '#f1f5f9',
      brightBlack: '#64748b',
      brightRed: '#fca5a5',
      brightGreen: '#86efac',
      brightYellow: '#fde047',
      brightBlue: '#93c5fd',
      brightMagenta: '#d8b4fe',
      brightCyan: '#67e8f9',
      brightWhite: '#ffffff',
    },
    fontFamily: "ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace",
    fontSize: 13,
    lineHeight: 1.1,
    cursorBlink: true,
    scrollback: 10000,
    allowProposedApi: true,
  });

  fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.loadAddon(new WebLinksAddon.WebLinksAddon());

  const container = document.getElementById('termContainer');
  term.open(container);

  // Enable WebGL renderer for better performance (falls back to canvas if unsupported)
  try {
    const webglAddon = new WebglAddon.WebglAddon();
    webglAddon.onContextLoss(() => { webglAddon.dispose(); });
    term.loadAddon(webglAddon);
  } catch (e) {
    console.warn('WebGL renderer not available, using canvas fallback:', e);
  }

  // Fit after a short delay so the container has dimensions
  requestAnimationFrame(() => {
    fitAddon.fit();
  });

  // Forward terminal keystrokes to PTY
  term.onData((data) => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'input', data }));
    }
  });

  // Send resize to backend
  term.onResize(({ cols, rows }) => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'resize', cols, rows }));
    }
  });

  // Refit on window resize
  const ro = new ResizeObserver(() => {
    if (fitAddon) fitAddon.fit();
  });
  ro.observe(container);
}

function doConnectWithExpires(url, token, expires) {
  ws = new WebSocket(url);
  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'auth', token, expires }));
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleServerMessage(msg);
  };
  ws.onclose = (e) => {
    setStatus('Disconnected');
    document.getElementById('connectPanel').style.display = 'flex';
    document.getElementById('terminalPanel').classList.remove('visible');
    if (e.code === 4001) {
      alert('Authentication failed');
      document.getElementById('autoConnectLoading').classList.remove('visible');
      document.getElementById('connectForm').style.display = '';
    }
    if (e.code === 4002) document.getElementById('expiredOverlay').classList.add('visible');
  };
  ws.onerror = () => setStatus('Disconnected');
}

function doConnect() {
  const url = document.getElementById('inputUrl').value.trim() || `ws://${location.host}/ws`;
  const token = document.getElementById('inputToken').value.trim();
  if (!token) { alert('Token required'); return; }
  doConnectWithExpires(url, token, undefined);
}

function handleServerMessage(msg) {
  switch (msg.type) {
    case 'connected':
      setStatus('Connected');
      // Hide loading if visible
      document.getElementById('autoConnectLoading').classList.remove('visible');
      document.getElementById('connectForm').style.display = '';
      document.getElementById('connectPanel').style.display = 'none';
      document.getElementById('terminalPanel').classList.add('visible');
      document.getElementById('btnInterrupt').disabled = false;
      document.getElementById('btnNewSession').disabled = false;

      // Clean URL params
      if (location.search) history.replaceState(null, '', location.pathname);

      initTerminal();

      // Send initial terminal size
      if (term) {
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      }
      break;

    case 'raw_output':
      // Write raw PTY output directly to xterm
      if (term) term.write(msg.data);
      break;

    case 'stream':
      // Structured events — forward as text since raw_output has the visual data
      // We can optionally display stream events as overlays or ignore them
      // since raw_output already provides the full terminal rendering.
      break;

    case 'permission_request':
      // Permission prompts are handled in the terminal itself via raw_output
      // (Claude shows y/n prompts in the TUI). No separate dialog needed.
      break;

    case 'status':
      setClaudeStatus(msg.status);
      break;

    case 'pong':
      break;

    case 'error':
      if (term) term.write('\r\n\x1b[31m[Error] ' + msg.message + '\x1b[0m\r\n');
      break;
  }
}

function sendInput(data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'input', data }));
  }
}

function doSend() {
  // Send Enter to submit any pending text in xterm's PTY buffer
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'input', data: '\r' }));
  }
}

function doInterrupt() {
  if (ws) ws.send(JSON.stringify({ type: 'interrupt' }));
}

function doNewSession() {
  if (ws) {
    ws.send(JSON.stringify({ type: 'session_new' }));
    if (term) term.clear();
  }
}

function toggleSlashPanel() {
  const panel = document.getElementById('slashPanel');
  panel.classList.toggle('visible');
}

function sendSlashCommand(cmd) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'send_message', content: cmd }));
  }
  // Hide the panel after sending
  document.getElementById('slashPanel').classList.remove('visible');
}

// Keep-alive ping
setInterval(() => {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'ping' }));
  }
}, 30000);
</script>
</body>
</html>
